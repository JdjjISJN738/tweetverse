<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TweetVerse | Real-Time Viral Trends</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script>
      // Highest-level Error Catcher
      window.onerror = function(message, source, lineno, colno, error) {
        document.body.innerHTML = `
          <div style="background:#FEE2E2;border:4px solid #EF4444;color:#B91C1C;padding:40px;margin:20px;border-radius:24px;font-family:monospace;z-index:999999;position:fixed;inset:0;">
             <h1 style="font-size:32px;font-weight:900;margin-bottom:20px;">CRITICAL JAVASCRIPT EVAL CRASH</h1>
             <p style="font-size:20px;"><strong>Error:</strong> ${message}</p>
             <p style="font-size:16px;margin-top:10px;"><strong>Location:</strong> ${source} at Line ${lineno}</p>
          </div>
        `;
        return true;
      };
    </script>
  </head>
  <body class="bg-[#F8FAFC]">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
